badges:
  - name: Build Status
    label: build
    message: ${{ (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'completed') && github.event.workflow_run.conclusion != 'failure' ? 'passing' : 'failing' }}
    color: ${{ (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'completed') && github.event.workflow_run.conclusion != 'failure' ? 'brightgreen' : 'red' }}
    style: flat-square
    logo: github
    url: https://github.com/chirag127/ChromeGuard-Official-Ad-Detection-Filter-Lists/actions/workflows/ci.yml

  - name: Code Coverage
    label: coverage
    message: 95%+
    color: blue
    style: flat-square
    logo: codecov
    url: https://codecov.io/gh/chirag127/ChromeGuard-Official-Ad-Detection-Filter-Lists

  - name: License
    label: license
    message: CC BY-NC 4.0
    color: lightgrey
    style: flat-square
    logo: a-icon-light
    url: https://github.com/chirag127/ChromeGuard-Official-Ad-Detection-Filter-Lists/blob/main/LICENSE

  - name: Repository Stars
    label: stars
    message: $(STARS)
    color: yellowgreen
    style: flat-square
    logo: github
    url: https://github.com/chirag127/ChromeGuard-Official-Ad-Detection-Filter-Lists

  - name: Documentation Standard
    label: doc-standard
    message: AGENTS.md
    color: success
    style: flat-square
    logo: book-open
    url: https://github.com/chirag127/ChromeGuard-Official-Ad-Detection-Filter-Lists/blob/main/.github/AGENTS.md

  - name: Content Standard
    label: format
    message: Linted
    color: success
    style: flat-square
    logo: check
    url: https://github.com/chirag127/ChromeGuard-Official-Ad-Detection-Filter-Lists/actions/workflows/ci.yml
